<script>

  {name:"Refilwe",role:"Appr",   shows:["BUT","FEL"]},
  {name:"Sydney", role:"Appr",   shows:["OKL","FEL"]}

var PERF={
  OKL:["2026-07-10","2026-07-12","2026-07-18","2026-07-21","2026-07-27","2026-08-02","2026-08-06","2026-08-08","2026-08-13","2026-08-15"],
  BUT:["2026-07-11","2026-07-13","2026-07-19","2026-07-28","2026-07-31","2026-08-03","2026-08-08","2026-08-15","2026-08-17"],
  COS:["2026-07-17","2026-07-20","2026-07-30","2026-08-01","2026-08-09","2026-08-11","2026-08-14"],
  FEL:["2026-07-18","2026-08-01","2026-08-04","2026-08-07","2026-08-10","2026-08-16"],
  ROB:["2026-08-02","2026-08-04","2026-08-07"]
};
var SC={
  OKL:{bg:"#fdecea",fg:"#b71c1c"},BUT:{bg:"#fef3e2",fg:"#7d4f00"},
  COS:{bg:"#eaf5e9",fg:"#2e7d32"},FEL:{bg:"#e3f2fd",fg:"#1565c0"},
  ROB:{bg:"#ede7f6",fg:"#4527a0"},PAV:{bg:"#e0f2f1",fg:"#00695c"},
  NC:{bg:"#e8e8e8",fg:"#555"},OTHER:{bg:"#f5f0e8",fg:"#5d4037"}
};
var CSHOWS=["OKL","BUT","COS","FEL","ROB","PAV","NC","OTHER"];
var ASHOWS=["OKL","BUT","COS","FEL","ROB","PAV","OTHER"];
var NSHOWS=["OKL","BUT","COS","FEL","ROB","PAV"];
var DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
var OTW=36,OTH=40,MTR=10;
var SEASON_WEEKS=12;
var BASE_DATE=new Date(2026,5,8);

var wkOff=0,currentView='week';
var sched={},clip=null;
var ES={pi:null,di:null,calls:[],at:[]};

// =====================================================
// GOOGLE DRIVE SYNC
// =====================================================
var GOOGLE_CLIENT_ID = '169959092831-eu11gi8trkittkt4hqbaf31bb9bicppj.apps.googleusercontent.com';
var DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
var DRIVE_FILENAME = 'glimmerglass-stage-ops-data.json';
var driveFileId = null;       // Drive file ID once located/created
var tokenClient = null;
var accessToken = null;
var driveConnected = false;
var pollTimer = null;
var lastKnownModTime = null;  // to detect remote changes
var isSavingToDrive = false;
var localChangePending = false;
var POLL_INTERVAL_MS = 30000; // 30s background poll

function setDriveStatus(state, label){
  // state: connected | disconnected | syncing | error
  var el = document.getElementById('drive-status');
  var dotColor = {connected:'green', disconnected:'amber', syncing:'blue', error:'red'}[state] || 'amber';
  el.className = 'drive-status ' + state;
  el.innerHTML = '<span class="dot ' + dotColor + '"></span> ' + label;
}

function fmtTS(d){
  var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var mo=d.getMonth()+1,dy=d.getDate(),hr=d.getHours(),mn=d.getMinutes();
  var s=hr>=12?'pm':'am';hr=hr%12||12;
  return days[d.getDay()]+' '+mo+'/'+dy+' '+hr+':'+(mn<10?'0':'')+mn+s;
}

function initGoogleAuth(){
  if(typeof google === 'undefined' || !google.accounts){
    setTimeout(initGoogleAuth, 300);
    return;
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: function(resp){
      if(resp.error){
        setDriveStatus('error','connect failed — try again');
        return;
      }
      accessToken = resp.access_token;
      driveConnected = true;
      document.getElementById('btn-connect').style.display='none';
      setDriveStatus('syncing','connecting...');
      gapi.client.setToken({access_token: accessToken});
      findOrCreateDriveFile();
    }
  });
  document.getElementById('btn-connect').style.display='inline-block';
  document.getElementById('btn-connect').addEventListener('click', function(){
    tokenClient.requestAccessToken({prompt: accessToken ? '' : 'consent'});
  });
  // try silent connect (no popup) in case already authorized this session
  initGapiClient();
}

function initGapiClient(){
  if(typeof gapi === 'undefined'){
    setTimeout(initGapiClient, 300);
    return;
  }
  gapi.load('client', function(){
    gapi.client.init({}).then(function(){
      gapi.client.load('drive', 'v3');
    });
  });
}

function findOrCreateDriveFile(){
  gapi.client.request({
    path: 'https://www.googleapis.com/drive/v3/files',
    params: {
      q: "name='" + DRIVE_FILENAME + "' and trashed=false",
      spaces: 'drive',
      fields: 'files(id, name, modifiedTime)'
    }
  }).then(function(resp){
    var files = resp.result.files;
    if(files && files.length > 0){
      driveFileId = files[0].id;
      lastKnownModTime = files[0].modifiedTime;
      loadFromDrive(true);
    } else {
      createDriveFile();
    }
  }, function(err){
    setDriveStatus('error','drive error — retry connect');
  });
}

function createDriveFile(){
  var metadata = { name: DRIVE_FILENAME, mimeType: 'application/json' };
  var initialData = buildSyncPayload();
  var boundary = '-------glimmerglass';
  var body =
    '--' + boundary + '\r\n' +
    'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
    JSON.stringify(metadata) + '\r\n' +
    '--' + boundary + '\r\n' +
    'Content-Type: application/json\r\n\r\n' +
    JSON.stringify(initialData) + '\r\n' +
    '--' + boundary + '--';

  gapi.client.request({
    path: 'https://www.googleapis.com/upload/drive/v3/files',
    method: 'POST',
    params: { uploadType: 'multipart' },
    headers: { 'Content-Type': 'multipart/related; boundary="' + boundary + '"' },
    body: body
  }).then(function(resp){
    driveFileId = resp.result.id;
    setDriveStatus('connected', 'synced just now');
    document.getElementById('last-saved').textContent = 'connected to Google Drive';
    startPolling();
  }, function(err){
    setDriveStatus('error', 'could not create sync file');
  });
}

function buildSyncPayload(){
  return {
    version: 1,
    updated: new Date().toISOString(),
    sched: sched,
    crew: CREW.map(function(c){ return {name:c.name, shows:c.shows}; })
  };
}

function loadFromDrive(isInitial){
  gapi.client.request({
    path: 'https://www.googleapis.com/drive/v3/files/' + driveFileId,
    params: { alt: 'media' }
  }).then(function(resp){
    var data = resp.result;
    if(data && data.sched){
      sched = data.sched;
      if(data.crew){
        for(var i=0;i<data.crew.length && i<CREW.length;i++){
          if(data.crew[i].name===CREW[i].name) CREW[i].shows = data.crew[i].shows;
        }
      }
    }
    setDriveStatus('connected', 'synced just now');
    var now = new Date();
    document.getElementById('last-saved').textContent = 'last synced: ' + fmtTS(now);
    if(currentView==='week') renderWeek(); else renderSeason();
    if(isInitial) startPolling();
  }, function(err){
    setDriveStatus('error', 'sync read failed');
  });
}

function saveToDrive(){
  if(!driveConnected || !driveFileId){ return; }
  isSavingToDrive = true;
  setDriveStatus('syncing', 'saving...');
  var payload = buildSyncPayload();
  gapi.client.request({
    path: 'https://www.googleapis.com/upload/drive/v3/files/' + driveFileId,
    method: 'PATCH',
    params: { uploadType: 'media' },
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(function(resp){
    isSavingToDrive = false;
    localChangePending = false;
    setDriveStatus('connected', 'synced just now');
    document.getElementById('last-saved').textContent = 'last synced: ' + fmtTS(new Date());
    // refresh modified time tracking so polling doesn't re-pull our own save
    gapi.client.request({
      path: 'https://www.googleapis.com/drive/v3/files/' + driveFileId,
      params: { fields: 'modifiedTime' }
    }).then(function(r){ lastKnownModTime = r.result.modifiedTime; });
  }, function(err){
    isSavingToDrive = false;
    setDriveStatus('error', 'save failed — will retry');
  });
}

// saveData is called throughout the app on every edit — now triggers a Drive save
function saveData(){
  if(driveConnected && driveFileId){
    saveToDrive();
  } else {
    setDriveStatus('disconnected', 'not connected — click Connect to sync');
  }
}

function startPolling(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(checkForRemoteChanges, POLL_INTERVAL_MS);
}

function checkForRemoteChanges(){
  if(!driveConnected || !driveFileId || isSavingToDrive) return;
  gapi.client.request({
    path: 'https://www.googleapis.com/drive/v3/files/' + driveFileId,
    params: { fields: 'modifiedTime' }
  }).then(function(resp){
    var remoteModTime = resp.result.modifiedTime;
    if(lastKnownModTime && remoteModTime !== lastKnownModTime){
      // someone else (or another tab/device) saved newer data — pull it in
      lastKnownModTime = remoteModTime;
      loadFromDrive(false);
    }
  }, function(err){ /* silent fail on background poll */ });
}

// --- Local JSON backup (manual safety net, not primary sync) ---
function exportData(){
  var data = buildSyncPayload();
  var json=JSON.stringify(data,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var ts=new Date();
  a.download='gg-stage-ops-backup-'+ts.getFullYear()+'-'+(ts.getMonth()+1)+'-'+ts.getDate()+'.json';
  a.href=url;a.click();
  URL.revokeObjectURL(url);
}

// --- Helpers ---
function sbg(s){return(SC[s]||SC.NC).bg;}
function sfg(s){return(SC[s]||SC.NC).fg;}
function bdg(s,sz){return '<span class="bdg" style="background:'+sbg(s)+';color:'+sfg(s)+';font-size:'+(sz||'10px')+'">'+s+'</span>';}
function son(d){var r=[];for(var s in PERF){if(PERF[s].indexOf(d)>=0)r.push(s);}return r;}
function pt(raw){
  if(!raw)return null;
  var s=raw.trim().toLowerCase().replace(/\s/g,'');
  var m=s.match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm)?$/);
  if(!m)return null;
  var h=parseInt(m[1]),mn=m[2]?parseInt(m[2]):0,mer=m[3];
  if(mer==='pm'&&h!==12)h+=12;
  if(mer==='am'&&h===12)h=0;
  // 1-7 without am/pm is ambiguous (could be 1am-7am or 1pm-7pm)
  // require explicit am/pm for those hours to avoid entry errors on late-night calls
  if(!mer&&h>=1&&h<=7)return null;
  // 8-11 assumed am, 12 assumed noon, 13-23 treated as 24h
  if(h>23||mn>59)return null;
  return(h<10?'0':'')+h+':'+(mn<10?'0':'')+mn;
}
function f12(t){
  if(!t)return'';
  var p=t.split(':'),h=parseInt(p[0]),m=parseInt(p[1]);
  var s=h>=12?'pm':'am';h=h%12||12;
  return h+(m?':'+(m<10?'0':'')+m:'')+s;
}
function toMin(t){var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function cH(c){
  if(!c.in||!c.out)return 0;
  var s=toMin(c.in),e=toMin(c.out);
  if(e<=s)e+=1440;
  return Math.round((e-s)/60*100)/100;
}
function wkStart(off){var b=new Date(BASE_DATE);b.setDate(b.getDate()+off*7);return b;}
function wkDates(off){
  var s=wkStart(off),r=[];
  for(var i=0;i<7;i++){var d=new Date(s);d.setDate(d.getDate()+i);r.push(d);}
  return r;
}
function fD(d){return(d.getMonth()+1)+'/'+(d.getDate());}
function dS(d){return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();}
function dk(wk,pi,di){return wk+'_'+pi+'_'+di;}
function gC(wk,pi,di){return sched[dk(wk,pi,di)]||[];}
function pH(wk,pi){
  var t=0;
  for(var di=0;di<7;di++){var cc=gC(wk,pi,di);for(var j=0;j<cc.length;j++)t+=cH(cc[j]);}
  return t;
}
function ckT(wk,pi,di){
  if(!di)return null;
  var p=gC(wk,pi,di-1),c=gC(wk,pi,di);
  if(!p.length||!c.length)return null;
  var lp=p[p.length-1],fc=c[0];
  if(!lp.out||!fc.in)return null;
  var pe=toMin(lp.out),cs=toMin(fc.in);
  // These are on different calendar days, so gap = remaining minutes in prev day + minutes into next day
  // pe is end time in minutes from midnight, cs is start time in minutes from midnight
  // Total gap across the day boundary = (1440 - pe) + cs
  var g=((1440-pe)+cs)/60;
  return g<MTR?Math.round(g*10)/10:null;
}

function renderWeek(){
  var dates=wkDates(wkOff);
  document.getElementById('wlbl').textContent='Wk '+(wkOff+1)+' · '+fD(dates[0])+' – '+fD(dates[6]);
  var otC=0,wC=0,tC=0,tot=0;
  for(var i=0;i<CREW.length;i++){
    var wh=pH(wkOff,i);tot+=wh;
    if(wh>=OTH)otC++;else if(wh>=OTW)wC++;
    for(var di=0;di<7;di++)if(ckT(wkOff,i,di)!==null)tC++;
  }
  tot=Math.round(tot*10)/10;
  document.getElementById('sumbar').innerHTML=
    '<div class="stat"><div class="val">'+tot+'h</div><div class="lbl">crew total this week</div></div>'+
    '<div class="stat'+(otC?' ot':'')+'"><div class="val">'+otC+'</div><div class="lbl">in overtime</div></div>'+
    '<div class="stat'+(wC?' warn':'')+'"><div class="val">'+wC+'</div><div class="lbl">OT risk (36–40h)</div></div>'+
    '<div class="stat'+(tC?' ot':'')+'"><div class="val">'+tC+'</div><div class="lbl">turnaround flags</div></div>';

  var th='<tr><th class="nth">crew</th>';

    if(sh.length)th+='<div style="margin-top:2px">'+sh.map(function(s){return bdg(s,'9px');}).join('')+'</div>';
    th+='</th>';
  }
  th+='<th style="min-width:46px;text-align:center">hrs</th></tr>';
  document.getElementById('thead').innerHTML=th;

  var tb='';
  for(var pi=0;pi<CREW.length;pi++){
    var p=CREW[pi],wh=Math.round(pH(wkOff,pi)*100)/100;
    var oc=wh>=OTH?' ot':wh>=OTW?' warn':'';
    var ot=wh>=OTH?'<span class="ottag">OT</span>':wh>=OTW?'<span class="warntag">~OT</span>':'';
    tb+='<tr><td class="ntd"><div class="pname">'+p.name+'</div><div class="prole">'+p.role+'</div>'
      +'<div class="pshows">'+p.shows.map(function(s){return bdg(s);}).join('')
      +'<button class="ebtn" data-pi="'+pi+'">✎</button></div></td>';
    for(var di=0;di<7;di++){
      var calls=gC(wkOff,pi,di),turn=ckT(wkOff,pi,di);
      var isSrc=clip&&clip.wk===wkOff&&clip.pi===pi&&clip.di===di;
      var isPst=clip&&!isSrc&&clip.wk===wkOff;
      var tc='dtd'+(isSrc?' csrc':isPst?' cpst':'');
      var inn='';
      if(calls.length){
        for(var ci=0;ci<calls.length;ci++){
          var c=calls[ci],h=cH(c);
          inn+='<div class="cb"><div class="ct">'+f12(c.in)+'–'+f12(c.out)+'</div>'
            +'<div class="cm">'+(h>0?'<span style="font-size:9px;color:#888">'+h.toFixed(1)+'h</span>':'')+bdg(c.show||'NC','9px')+'</div></div>';
        }
        if(turn!==null)inn+='<span class="tw">⚠ '+turn+'h turn</span>';
        inn+='<div class="cbtns"><button class="cbtn cpb" data-pi="'+pi+'" data-di="'+di+'">copy</button>'
          +(isPst?'<button class="cbtn pst ppb" data-pi="'+pi+'" data-di="'+di+'">paste</button>':'')+'</div>';
      }else{
        inn=isPst?'<button class="cbtn pst ppb" data-pi="'+pi+'" data-di="'+di+'">paste</button>':'<span class="empty">—</span>';
      }
      tb+='<td class="'+tc+'" data-pi="'+pi+'" data-di="'+di+'">'+inn+'</td>';
    }
    tb+='<td class="htd'+oc+'">'+wh.toFixed(1)+ot+'</td></tr>';
  }
  document.getElementById('tbody').innerHTML=tb;
  bindGrid();

  var ch=document.getElementById('cliphint');
  if(clip&&clip.wk===wkOff){
    ch.style.display='inline';
    ch.textContent='copied '+CREW[clip.pi].name+' '+DAYS[clip.di]+' — click cell to paste · esc to cancel';
  }else ch.style.display='none';
}

function bindGrid(){
  document.querySelectorAll('td.dtd').forEach(function(td){td.addEventListener('click',onCell);});
  document.querySelectorAll('.cpb').forEach(function(b){
    b.addEventListener('click',function(e){
      e.stopPropagation();
      var pi=parseInt(this.dataset.pi),di=parseInt(this.dataset.di);
      var cc=gC(wkOff,pi,di);if(!cc.length)return;
      clip={wk:wkOff,pi:pi,di:di,calls:cc.map(function(x){return{in:x.in,out:x.out,show:x.show};})};
      renderWeek();
    });
  });
  document.querySelectorAll('.ppb').forEach(function(b){
    b.addEventListener('click',function(e){
      e.stopPropagation();
      var pi=parseInt(this.dataset.pi),di=parseInt(this.dataset.di);
      if(!clip)return;
      sched[dk(wkOff,pi,di)]=clip.calls.map(function(x){return{in:x.in,out:x.out,show:x.show};});
      saveData();renderWeek();
    });
  });
  document.querySelectorAll('.ebtn').forEach(function(b){
    b.addEventListener('click',function(e){e.stopPropagation();openAsgn(parseInt(this.dataset.pi),this);});
  });
}

function onCell(e){
  if(e.target.tagName==='BUTTON')return;
  var pi=parseInt(this.dataset.pi),di=parseInt(this.dataset.di);
  if(clip&&clip.wk===wkOff){
    if(!(clip.pi===pi&&clip.di===di)){
      sched[dk(wkOff,pi,di)]=clip.calls.map(function(x){return{in:x.in,out:x.out,show:x.show};});
      saveData();renderWeek();
    }
    return;
  }
  openPanel(pi,di);
}

function openAsgn(pi,btn){
  var a=document.getElementById('asgn-popup');
  // build content first so we can measure real height
  var h='<div class="asgn-title">'+CREW[pi].name+' — assignments</div>';
  ASHOWS.forEach(function(s){
    h+='<label><input type="checkbox" data-pi="'+pi+'" data-s="'+s+'" '+(CREW[pi].shows.indexOf(s)>=0?'checked':'')+'>'+bdg(s)+'</label>';
  });
  h+='<button class="adone" id="adone">done</button>';
  a.innerHTML=h;
  // render offscreen to measure
  a.style.visibility='hidden';
  a.style.display='block';
  a.style.top='-9999px';
  a.style.left='0px';
  var r=btn.getBoundingClientRect();
  var popH=a.offsetHeight;
  var popW=a.offsetWidth;
  var spaceBelow=window.innerHeight-r.bottom;
  var top=spaceBelow>=popH+8 ? r.bottom+4 : Math.max(4,r.top-popH-4);
  var left=Math.min(r.left,window.innerWidth-popW-8);
  a.style.top=top+'px';
  a.style.left=left+'px';
  a.style.visibility='visible';
  a.querySelectorAll('input[type=checkbox]').forEach(function(cb){
    cb.addEventListener('change',function(){
      var p2=parseInt(this.dataset.pi),sh=this.dataset.s;
      if(this.checked){if(CREW[p2].shows.indexOf(sh)<0)CREW[p2].shows.push(sh);}
      else CREW[p2].shows=CREW[p2].shows.filter(function(x){return x!==sh;});
      saveData();renderWeek();
    });
  });
  document.getElementById('adone').addEventListener('click',function(){
    document.getElementById('asgn-popup').style.display='none';
  });
}

function rCalls(){
  var tb=document.getElementById('ctb');if(!tb)return;
  tb.innerHTML='';
  for(var i=0;i<ES.calls.length;i++){
    var c=ES.calls[i],h=cH(c),tr=document.createElement('tr');
    tr.innerHTML='<td style="font-size:11px;color:#aaa;text-align:center">'+(i+1)+'</td>'
      +'<td><input class="ti'+(c.in?' ok':'')+'" data-ci="'+i+'" data-f="in" value="'+(c.in?f12(c.in):'')+'" placeholder="9am" autocomplete="off" spellcheck="false"></td>'
      +'<td style="text-align:center;color:#bbb;font-size:14px;padding:0 3px">–</td>'
      +'<td><input class="ti'+(c.out?' ok':'')+'" data-ci="'+i+'" data-f="out" value="'+(c.out?f12(c.out):'')+'" placeholder="1pm" autocomplete="off" spellcheck="false"></td>'
      +'<td><select class="ss" data-ci="'+i+'">'+CSHOWS.map(function(s){return'<option value="'+s+'"'+(c.show===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select></td>'
      +'<td class="hdisp" id="hd'+i+'">'+(h>0?h.toFixed(1)+'h':'')+'</td>'
      +'<td>'+(ES.calls.length>1?'<button class="rmbtn" data-i="'+i+'">×</button>':'')+'</td>';
    tb.appendChild(tr);
  }
  tb.querySelectorAll('input.ti').forEach(function(inp){
    inp.addEventListener('blur',function(){
      var p=pt(this.value.trim());
      if(p)cIP(this,p);
      else if(!this.value.trim()){ES.calls[parseInt(this.dataset.ci)][this.dataset.f]='';this.classList.remove('ok','err');}
      else this.classList.add('err');
      rFlags();
    });
    inp.addEventListener('keydown',function(e){
      if(e.key==='Enter'){e.preventDefault();var p=pt(this.value.trim());if(p)cIP(this,p);rFlags();return;}
      if(e.key!=='Tab')return;
      var ci=parseInt(this.dataset.ci),f=this.dataset.f;
      if(f==='out'&&!e.shiftKey){
        var p=pt(this.value.trim());
        if(p){
          cIP(this,p);
          if(ci===ES.calls.length-1&&ES.calls.length<3){
            e.preventDefault();
            ES.calls.push({in:'',out:'',show:'NC'});
            rCalls();rFlags();
            setTimeout(function(){
              var ins=document.querySelectorAll('#ctb input.ti');
              for(var j=0;j<ins.length;j++){if(parseInt(ins[j].dataset.ci)===ci+1&&ins[j].dataset.f==='in'){ins[j].focus();break;}}
            },15);
          }
        }
      }
    });
  });
  tb.querySelectorAll('select.ss').forEach(function(sel){
    sel.addEventListener('change',function(){ES.calls[parseInt(this.dataset.ci)].show=this.value;rFlags();});
  });
  tb.querySelectorAll('.rmbtn').forEach(function(b){
    b.addEventListener('click',function(){ES.calls.splice(parseInt(this.dataset.i),1);rCalls();rFlags();});
  });
}

function cIP(inp,parsed){
  var ci=parseInt(inp.dataset.ci),f=inp.dataset.f;
  ES.calls[ci][f]=parsed;inp.value=f12(parsed);inp.classList.add('ok');inp.classList.remove('err');
  var hd=document.getElementById('hd'+ci);
  if(hd){var h=cH(ES.calls[ci]);hd.textContent=h>0?h.toFixed(1)+'h':'';}
}

function rFlags(){
  var area=document.getElementById('fa');if(!area)return;
  var dh=0;for(var i=0;i<ES.calls.length;i++)dh+=cH(ES.calls[i]);
  var oh=0;
  for(var x=0;x<7;x++){if(x!==ES.di){var cc=gC(wkOff,ES.pi,x);for(var j=0;j<cc.length;j++)oh+=cH(cc[j]);}}
  var proj=Math.round((dh+oh)*100)/100,flags=[];
  if(proj>=OTH)flags.push('projected '+proj.toFixed(1)+'h this week — overtime');
  else if(proj>=OTW)flags.push('projected '+proj.toFixed(1)+'h — approaching OT');
  if(ES.di>0){
    var prev=gC(wkOff,ES.pi,ES.di-1);
    if(prev.length&&ES.calls.length){
      var lp=prev[prev.length-1],fc=ES.calls[0];
      if(lp.out&&fc.in){
        var pe=toMin(lp.out),cs=toMin(fc.in);
        var gap=((1440-pe)+cs)/60;
        if(gap<MTR)flags.push('only '+Math.round(gap*10)/10+'h turnaround from yesterday');
      }
    }
  }
  // warn if call tagged with a show the person isn't assigned to
  var swarn=[];
  for(var si=0;si<ES.calls.length;si++){
    var cs2=ES.calls[si].show;
    if(cs2&&cs2!=='NC'&&cs2!=='OTHER'&&cs2!=='PAV'){
      if(CREW[ES.pi].shows.indexOf(cs2)<0)
        swarn.push('call '+(si+1)+' tagged '+cs2+' — '+CREW[ES.pi].name+' not assigned to '+cs2);
    }
  }
  var allF=flags.concat(swarn);
  if(allF.length){area.innerHTML='<div class="flags '+(proj>=OTH?'ot':'warn')+'">'+allF.join(' · ')+'</div>';}
  else area.innerHTML='';
}

function rApply(){
  var grid=document.getElementById('ag');if(!grid)return;
  grid.innerHTML='';
  for(var i=0;i<CREW.length;i++){
    var cr=CREW[i],isSelf=i===ES.pi,checked=ES.at.indexOf(i)>=0;
    var div=document.createElement('div');
    div.className='apitem'+(isSelf?' self':checked?' on':'');
    var st='';for(var k=0;k<cr.shows.length;k++)st+=bdg(cr.shows[k],'9px');
    div.innerHTML='<input type="checkbox" '+(isSelf||checked?'checked':'')+' '+(isSelf?'disabled':'')+' style="pointer-events:none">'
      +'<div><div style="font-weight:700;font-size:11px">'+cr.name+'</div>'
      +'<div style="display:flex;flex-wrap:wrap;gap:2px;margin-top:1px">'+(st||'<span style="font-size:10px;color:#888">'+cr.role+'</span>')+'</div></div>';
    if(!isSelf)(function(idx){div.addEventListener('click',function(){
      var p=ES.at.indexOf(idx);if(p>=0)ES.at.splice(p,1);else ES.at.push(idx);rApply();
    });})(i);
    grid.appendChild(div);
  }
}

function sa(mode){
  ES.at=[];
  if(mode==='all'){for(var i=0;i<CREW.length;i++){if(i!==ES.pi)ES.at.push(i);}}
  else if(mode==='role'){var r=CREW[ES.pi].role;for(var i=0;i<CREW.length;i++){if(i!==ES.pi&&CREW[i].role===r)ES.at.push(i);}}
  else if(mode.indexOf('show:')===0){var s=mode.split(':')[1];for(var i=0;i<CREW.length;i++){if(i!==ES.pi&&CREW[i].shows.indexOf(s)>=0)ES.at.push(i);}}
  else if(mode.indexOf('not:')===0){var ex=mode.split(':')[1];for(var i=0;i<CREW.length;i++){if(i!==ES.pi&&CREW[i].shows.indexOf(ex)<0)ES.at.push(i);}}
  rApply();
}

function closePanel(){document.getElementById('overlay').style.display='none';}

function savePanel(){
  var v=[];
  for(var i=0;i<ES.calls.length;i++){var c=ES.calls[i];if(c.in&&c.out)v.push({in:c.in,out:c.out,show:c.show});}
  if(v.length){
    sched[dk(wkOff,ES.pi,ES.di)]=v;
    for(var i=0;i<ES.at.length;i++)sched[dk(wkOff,ES.at[i],ES.di)]=v.map(function(c){return{in:c.in,out:c.out,show:c.show};});
  }else{
    delete sched[dk(wkOff,ES.pi,ES.di)];
    for(var i=0;i<ES.at.length;i++)delete sched[dk(wkOff,ES.at[i],ES.di)];
  }
  saveData();closePanel();renderWeek();
}

function clearDay(){
  delete sched[dk(wkOff,ES.pi,ES.di)];
  for(var i=0;i<ES.at.length;i++)delete sched[dk(wkOff,ES.at[i],ES.di)];
  saveData();closePanel();renderWeek();
}

// --- Nav ---
document.getElementById('btn-prev').addEventListener('click',function(){clip=null;wkOff=Math.max(0,wkOff-1);renderWeek();});
document.getElementById('btn-next').addEventListener('click',function(){clip=null;wkOff=Math.min(SEASON_WEEKS-1,wkOff+1);renderWeek();});
document.getElementById('btn-week-view').addEventListener('click',function(){switchView('week');});
document.getElementById('btn-season-view').addEventListener('click',function(){switchView('season');});
document.getElementById('btn-export').addEventListener('click',exportData);
document.getElementById('btn-restore').addEventListener('click',function(){document.getElementById('import-file').click();});
document.getElementById('import-file').addEventListener('change',function(){
  if(this.files&&this.files[0])restoreFromBackup(this.files[0]);
  this.value='';
});
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closePanel();});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){
    var a=document.getElementById('asgn-popup');
    if(a.style.display!=='none'){a.style.display='none';return;}
    var ov=document.getElementById('overlay');
    if(ov.style.display!=='none'){closePanel();return;}
    if(clip){clip=null;renderWeek();}
  }
});
document.addEventListener('click',function(e){
  var a=document.getElementById('asgn-popup');
  if(a.style.display!=='none'&&!a.contains(e.target)&&!e.target.classList.contains('ebtn'))a.style.display='none';
});

function restoreFromBackup(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!data.sched)throw new Error('invalid file');
      showConfirm(
        'Restore from backup?',
        'This will replace all current schedule data with the backup from: <b>'+file.name+'</b><br><br>If connected to Drive, this will also overwrite the synced copy. This cannot be undone.',
        function(){
          sched=data.sched;
          if(data.crew){
            for(var i=0;i<data.crew.length&&i<CREW.length;i++){
              if(data.crew[i].name===CREW[i].name)CREW[i].shows=data.crew[i].shows;
            }
          }
          saveData();
          if(currentView==='week')renderWeek();else renderSeason();
        }
      );
    }catch(ex){
      alert('Could not read that file. Make sure it\'s a Glimmerglass backup file (.json).');
    }
  };
  reader.readAsText(file);
}

// --- Boot ---
renderWeek();
initGoogleAuth();
</script>
